services:

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: economix-app
    restart: unless-stopped
    environment:
      APP__HOST: 0.0.0.0
      APP__PORT: 8000
      SQL__HOST: postgres
      SQL__PORT: 5432
      SQL__USER: ${SQL__USER:-postgres}
      SQL__PASSWORD: ${SQL__PASSWORD:-postgres}
      SQL__DATABASE: ${SQL__DATABASE:-economix}
    ports:
      - "7813:8000"
    volumes:
      - ./app:/app/app
    depends_on:
      postgres:
        condition: service_healthy

  web:
    image: node:20-alpine
    container_name: economix-web
    restart: unless-stopped
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    environment:
      API_PROXY_TARGET: http://app:8000
    ports:
      - "7575:5173"
    volumes:
      - ./web:/app
      - web-node-modules:/app/node_modules
    depends_on:
      - app

  postgres:
    image: postgres:17-alpine
    container_name: economix-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${SQL__USER:-postgres}
      POSTGRES_PASSWORD: ${SQL__PASSWORD:-postgres}
      POSTGRES_DB: ${SQL__DATABASE:-economix}
    ports:
      - "7423:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U ${SQL__USER:-postgres} -d ${SQL__DATABASE:-economix}
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
  web-node-modules:
